name: Playwright CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias raíz
        run: npm install

      - name: Instalar Playwright
        run: npx playwright install --with-deps

      - name: Levantar Kafka
        run: docker compose up -d

      - name: Instalar backend
        run: npm install
        working-directory: backend

      - name: Levantar backend server
        run: nohup npm run start-server > ../server.log 2>&1 &
        working-directory: backend

      - name: Levantar worker
        run: nohup npm run start-worker > ../worker.log 2>&1 &
        working-directory: backend

      - name: Instalar frontend
        run: npm install
        working-directory: frontend

      - name: Levantar frontend
        run: nohup npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &
        working-directory: frontend

      - name: Esperar servicios
        run: sleep 25

      - name: Ejecutar pruebas Playwright
        run: npx playwright test tests/transfer-async.spec.js --workers=1 --repeat-each=3

      - name: Guardar reporte HTML si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/