name: Playwright CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias raíz
        run: npm install

      - name: Instalar Playwright Browsers
        run: |
          chmod +x node_modules/.bin/playwright
          ./node_modules/.bin/playwright install --with-deps

      - name: Levantar Kafka
        run: docker compose up -d

      - name: Instalar backend
        run: npm install
        working-directory: backend

      - name: Levantar backend server
        run: nohup npm run start-server > ../server.log 2>&1 &
        working-directory: backend

      - name: Levantar worker
        run: nohup npm run start-worker > ../worker.log 2>&1 &
        working-directory: backend

      - name: Instalar frontend
        run: npm install
        working-directory: frontend

      - name: Levantar frontend
        working-directory: frontend
        run: |
          chmod +x node_modules/.bin/vite
          ./node_modules/.bin/vite --host 0.0.0.0 --port 5173 > ../frontend.log 2>&1 &

      - name: Ver log frontend
        run: |
          sleep 5
          cat frontend.log || true

      - name: Esperar servicios
        run: |
          echo "Esperando backend..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done'

          echo "Esperando frontend..."
          timeout 60 bash -c 'until curl -s http://localhost:5173 > /dev/null; do sleep 2; done'

          echo "Servicios listos"

      - name: Ejecutar pruebas Playwright
        run: npx playwright test tests/transfer-async.spec.js --workers=1

      - name: Guardar reporte HTML si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/